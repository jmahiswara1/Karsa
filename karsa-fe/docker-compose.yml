services:
  fe-karsa:
    build: .
    container_name: karsa_fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    networks: [karsa_network]

networks:
  karsa_network:
    external: true
